<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthDash — 医疗健康管理平台</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:    #1E40AF;
      --primary-light: #3B82F6;
      --primary-lighter: #DBEAFE;
      --accent:     #F59E0B;
      --accent-light: #FEF3C7;
      --bg:         #F0F4FA;
      --card:       #FFFFFF;
      --text:       #1E3A8A;
      --text-muted: #64748B;
      --text-body:  #334155;
      --success:    #10B981;
      --success-bg: #D1FAE5;
      --danger:     #EF4444;
      --danger-bg:  #FEE2E2;
      --warning:    #F59E0B;
      --warning-bg: #FEF3C7;
      --border:     #E2E8F0;
      --sidebar-w:  240px;
      --header-h:   64px;
    }
    html { font-family: 'Fira Sans', system-ui, sans-serif; font-size: 16px; line-height: 1.6; }
    body { background: var(--bg); color: var(--text-body); min-height: 100vh; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; animation: none !important; } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Focus ring */
    :focus-visible { outline: 3px solid var(--primary-light); outline-offset: 2px; border-radius: 4px; }

    /* Layout */
    .layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--primary);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-text { color: #fff; font-weight: 700; font-size: 15px; line-height: 1.2; }
    .logo-sub { color: rgba(255,255,255,0.55); font-size: 11px; }
    .sidebar-section { padding: 20px 12px 8px; }
    .sidebar-label { color: rgba(255,255,255,0.4); font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.18); color: #fff; }
    .nav-item svg { flex-shrink: 0; }
    .nav-badge {
      margin-left: auto;
      background: var(--danger);
      color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
    }
    .sidebar-bottom {
      margin-top: auto;
      padding: 16px 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .user-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    .user-card:hover { background: rgba(255,255,255,0.08); }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 13px; flex-shrink: 0;
    }
    .user-name { color: #fff; font-size: 13px; font-weight: 600; }
    .user-role { color: rgba(255,255,255,0.5); font-size: 11px; }

    /* Main */
    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* Header */
    .header {
      height: var(--header-h);
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 28px;
      gap: 16px;
      position: sticky; top: 0; z-index: 50;
    }
    .header-title { font-size: 18px; font-weight: 700; color: var(--text); flex: 1; }
    .header-date { color: var(--text-muted); font-size: 13px; }
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      min-width: 220px;
    }
    .search-box input {
      border: none; background: transparent; font-family: inherit;
      font-size: 13px; color: var(--text-body); outline: none; width: 100%;
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .icon-btn {
      width: 38px; height: 38px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
    }
    .icon-btn:hover { background: var(--bg); }
    .notif-dot {
      position: absolute; top: 7px; right: 7px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--danger);
      border: 2px solid var(--card);
    }

    /* Content */
    .content { padding: 24px 28px; flex: 1; }

    /* KPI Cards */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: box-shadow 0.2s ease;
    }
    .kpi-card:hover { box-shadow: 0 4px 20px rgba(30,64,175,0.08); }
    .kpi-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .kpi-icon {
      width: 42px; height: 42px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .kpi-badge {
      font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 20px;
      display: flex; align-items: center; gap: 3px;
    }
    .kpi-value { font-size: 28px; font-weight: 700; color: var(--text); font-family: 'Fira Code', monospace; line-height: 1; margin-bottom: 4px; }
    .kpi-label { font-size: 13px; color: var(--text-muted); }

    /* Charts row */
    .charts-row { display: grid; grid-template-columns: 1fr 340px; gap: 16px; margin-bottom: 24px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
    .card-header { padding: 18px 20px 0; display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .card-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .card-body { padding: 16px 20px 20px; }

    /* Line Chart */
    .chart-wrap { width: 100%; height: 200px; position: relative; }
    .chart-svg { width: 100%; height: 100%; overflow: visible; }
    .chart-grid-line { stroke: var(--border); stroke-width: 1; }
    .chart-area { fill: url(#areaGrad); opacity: 0.6; }
    .chart-line { fill: none; stroke: var(--primary-light); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .chart-line-2 { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 5 3; }
    .chart-dot { fill: var(--primary-light); stroke: var(--card); stroke-width: 2; }
    .y-label { font-size: 10px; fill: var(--text-muted); font-family: 'Fira Code', monospace; }
    .x-label { font-size: 11px; fill: var(--text-muted); }
    .chart-legend { display: flex; gap: 16px; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

    /* Donut Chart */
    .donut-wrap { display: flex; flex-direction: column; align-items: center; }
    .donut-center-text { font-size: 28px; font-weight: 700; color: var(--text); font-family: 'Fira Code', monospace; }
    .donut-center-label { font-size: 12px; color: var(--text-muted); }
    .dept-list { width: 100%; margin-top: 8px; }
    .dept-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
    .dept-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .dept-name { font-size: 13px; color: var(--text-body); flex: 1; }
    .dept-count { font-size: 13px; font-weight: 600; color: var(--text); font-family: 'Fira Code', monospace; }
    .dept-pct { font-size: 11px; color: var(--text-muted); margin-left: 4px; }

    /* Bottom row */
    .bottom-row { display: grid; grid-template-columns: 1fr 340px; gap: 16px; }

    /* Patient Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; padding: 10px 16px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    thead th:first-child { border-radius: 8px 0 0 0; }
    thead th:last-child { border-radius: 0 8px 0 0; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; cursor: pointer; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #F8FAFF; }
    tbody td { padding: 12px 16px; font-size: 13px; color: var(--text-body); }
    .patient-name { font-weight: 600; color: var(--text); }
    .patient-id { font-size: 11px; color: var(--text-muted); font-family: 'Fira Code', monospace; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .status-badge.stable { background: var(--success-bg); color: #065F46; }
    .status-badge.warning { background: var(--warning-bg); color: #92400E; }
    .status-badge.critical { background: var(--danger-bg); color: #991B1B; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .stable .status-dot { background: var(--success); }
    .warning .status-dot { background: var(--warning); }
    .critical .status-dot { background: var(--danger); }
    .vital-chip {
      font-family: 'Fira Code', monospace;
      font-size: 12px; font-weight: 500;
      padding: 2px 6px;
      background: var(--primary-lighter);
      color: var(--primary);
      border-radius: 4px;
    }

    /* Alerts panel */
    .alerts-list { display: flex; flex-direction: column; gap: 10px; }
    .alert-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      transition: all 0.15s ease;
      cursor: pointer;
    }
    .alert-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .alert-item.critical { background: #FFF5F5; border-color: #FECACA; }
    .alert-item.warning  { background: #FFFBEB; border-color: #FDE68A; }
    .alert-item.info     { background: #EFF6FF; border-color: #BFDBFE; }
    .alert-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .alert-item.critical .alert-icon { background: var(--danger-bg); }
    .alert-item.warning  .alert-icon { background: var(--warning-bg); }
    .alert-item.info     .alert-icon { background: var(--primary-lighter); }
    .alert-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .alert-desc  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .alert-time  { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-family: 'Fira Code', monospace; }
  </style>
</head>

  const maxVal = 300;
  const yTicks = [0, 100, 200, 300];

  const toX = i => padL + (i / (visitData.length - 1)) * innerW;
  const toY = v => padT + innerH - (v / maxVal) * innerH;

  const linePath = arr => arr.map((d, i) => `${i === 0 ? 'M' : 'L'}${toX(i)},${toY(d)}`).join(' ');
  const areaPath = arr => `${linePath(arr)} L${toX(arr.length - 1)},${padT + innerH} L${toX(0)},${padT + innerH} Z`;

  const currLine = linePath(visitData.map(d => d.curr));
  const prevLine = linePath(visitData.map(d => d.prev));
  const currArea = areaPath(visitData.map(d => d.curr));

  return (
    <div className="chart-wrap">
      <svg viewBox={`0 0 ${W} ${H}`} className="chart-svg">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stopColor="#3B82F6" stopOpacity="0.25"/>
            <stop offset="100%" stopColor="#3B82F6" stopOpacity="0"/>
          </linearGradient>
        </defs>
        {/* Grid */}
        {yTicks.map(v => (
          <g key={v}>
            <line x1={padL} y1={toY(v)} x2={W - padR} y2={toY(v)} className="chart-grid-line" />
            <text x={padL - 6} y={toY(v) + 4} className="y-label" textAnchor="end">{v}</text>
          </g>
        ))}
        {/* X Labels */}
        {visitData.map((d, i) => (
          <text key={i} x={toX(i)} y={H - 6} className="x-label" textAnchor="middle">{d.label}</text>
        ))}
        {/* Area */}
        <path d={currArea} className="chart-area" />
        {/* Lines */}
        <path d={prevLine} className="chart-line-2" />
        <path d={currLine} className="chart-line" />
        {/* Dots */}
        {visitData.map((d, i) => (
          <circle key={i} cx={toX(i)} cy={toY(d.curr)} r="4" className="chart-dot" />
        ))}
      </svg>
      <div className="chart-legend">
        <div className="legend-item"><div className="legend-dot" style={{background:"#3B82F6"}} />本周</div>
        <div className="legend-item"><div className="legend-dot" style={{background:"#F59E0B"}} />上周</div>
      </div>
    </div>
  );
};

/* ─── Donut Chart ─── */
const DonutChart = () => {
  const R = 60, cx = 80, cy = 80, strokeW = 22;
  const circumference = 2 * Math.PI * R;
  let offset = 0;
  const segments = deptData.map(d => {
    const dashLen = (d.pct / 100) * circumference;
    const gap = circumference - dashLen;
    const seg = { ...d, dashLen, gap, offset };
    offset += dashLen + 2;
    return seg;
  });

  return (
    <div className="donut-wrap">
      <svg width="160" height="160" viewBox="0 0 160 160" aria-label="科室分布图">
        <circle cx={cx} cy={cy} r={R} fill="none" stroke="#F1F5F9" strokeWidth={strokeW} />
        {segments.map((s, i) => (
          <circle key={i} cx={cx} cy={cy} r={R} fill="none"
            stroke={s.color} strokeWidth={strokeW}
            strokeDasharray={`${s.dashLen - 2} ${circumference - s.dashLen + 2}`}
            strokeDashoffset={-s.offset + circumference * 0.25}
            style={{ transition: 'stroke-dashoffset 0.3s' }}
          />
        ))}
        <text x={cx} y={cy - 6} textAnchor="middle" className="donut-center-text" style={{fontSize:22,fontWeight:700,fill:'#1E3A8A',fontFamily:'Fira Code'}}>248</text>
        <text x={cx} y={cy + 14} textAnchor="middle" style={{fontSize:11,fill:'#64748B',fontFamily:'Fira Sans'}}>今日总诊</text>
      </svg>
      <div className="dept-list">
        {deptData.map((d, i) => (
          <div key={i} className="dept-item">
            <div className="dept-dot" style={{background: d.color}} />
            <span className="dept-name">{d.name}</span>
            <span className="dept-count">{d.count}</span>
            <span className="dept-pct">{d.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
};
