<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据架构矢量插画</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0e14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .container {
      background: #0d1117;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #illustration {
      display: block;
      max-width: 100%;
      height: auto;
    }
    .toolbar {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-download {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
    }
    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <svg id="illustration" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520">
      <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#0a0e14" />
          <stop offset="100%" style="stop-color:#0d1117" />
        </linearGradient>
        <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="1.5" result="blur" />
          <feFlood flood-color="#8b5cf6" flood-opacity="0.6" />
          <feComposite in2="blur" operator="in" />
          <feMerge>
            <feMergeNode />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
        <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="1" result="blur" />
          <feFlood flood-color="#22d3ee" flood-opacity="0.7" />
          <feComposite in2="blur" operator="in" />
          <feMerge>
            <feMergeNode />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
        <linearGradient id="planeTop" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.9" />
          <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.95" />
        </linearGradient>
        <linearGradient id="planeMid" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.85" />
          <stop offset="100%" style="stop-color:#0c1929;stop-opacity:0.95" />
        </linearGradient>
        <linearGradient id="blockHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#38bdf8" />
          <stop offset="100%" style="stop-color:#0ea5e9" />
        </linearGradient>
      </defs>

      <!-- Background -->
      <rect width="720" height="520" fill="url(#bgGrad)" />

      <!-- Isometric helpers: angle ~30°, scale: 0.866 (cos30) x, 0.5 y -->
      <g id="scene" transform="translate(360 80) scale(1.2)">
        <!-- ========== BOTTOM LAYER: Data blocks (hexagonal grid) ========== -->
        <g id="bottomLayer">
          <!-- Grid base shadow -->
          <path d="M-180 200 L80 200 L220 80 L220 -60 L-20 -60 L-180 80 Z" fill="#0f172a" stroke="#1e293b" stroke-width="0.5" opacity="0.8" />
          <!-- Hex/cube blocks - row by row, some highlighted -->
          <g id="dataBlocks">
            <!-- Back row -->
            <path d="M-160 100 L-100 130 L-100 190 L-160 160 Z" fill="#1e3a5f" stroke="#334155" stroke-width="0.8" />
            <path d="M-100 130 L-40 160 L-40 220 L-100 190 Z" fill="url(#blockHighlight)" stroke="#22d3ee" stroke-width="0.8" filter="url(#glowCyan)" opacity="0.9" />
            <path d="M-40 160 L20 190 L20 250 L-40 220 Z" fill="#1e3a5f" stroke="#334155" stroke-width="0.8" />
            <path d="M20 190 L80 220 L80 280 L20 250 Z" fill="url(#blockHighlight)" stroke="#22d3ee" stroke-width="0.8" filter="url(#glowCyan)" opacity="0.9" />
            <path d="M80 220 L140 250 L140 310 L80 280 Z" fill="#1e3a5f" stroke="#334155" stroke-width="0.8" />
            <path d="M140 250 L200 280 L200 340 L140 310 Z" fill="url(#blockHighlight)" stroke="#22d3ee" stroke-width="0.8" filter="url(#glowCyan)" opacity="0.9" />
            <!-- Mid rows -->
            <path d="M-160 160 L-100 190 L-100 250 L-160 220 Z" fill="url(#blockHighlight)" stroke="#22d3ee" stroke-width="0.8" filter="url(#glowCyan)" opacity="0.9" />
            <path d="M-100 190 L-40 220 L-40 280 L-100 250 Z" fill="#1e3a5f" stroke="#334155" stroke-width="0.8" />
            <path d="M-40 220 L20 250 L20 310 L-40 280 Z" fill="url(#blockHighlight)" stroke="#22d3ee" stroke-width="0.8" filter="url(#glowCyan)" opacity="0.9" />
            <path d="M20 250 L80 280 L80 340 L20 310 Z" fill="#1e3a5f" stroke="#334155" stroke-width="0.8" />
            <path d="M80 280 L140 310 L140 370 L80 340 Z" fill="url(#blockHighlight)" stroke="#22d3ee" stroke-width="0.8" filter="url(#glowCyan)" opacity="0.9" />
            <path d="M140 310 L200 340 L200 400 L140 370 Z" fill="#1e3a5f" stroke="#334155" stroke-width="0.8" />
            <!-- Front rows -->
            <path d="M-160 220 L-100 250 L-100 310 L-160 280 Z" fill="#1e3a5f" stroke="#334155" stroke-width="0.8" />
            <path d="M-100 250 L-40 280 L-40 340 L-100 310 Z" fill="url(#blockHighlight)" stroke="#22d3ee" stroke-width="0.8" filter="url(#glowCyan)" opacity="0.9" />
            <path d="M-40 280 L20 310 L20 370 L-40 340 Z" fill="#1e3a5f" stroke="#334155" stroke-width="0.8" />
            <path d="M20 310 L80 340 L80 400 L20 370 Z" fill="#1e3a5f" stroke="#334155" stroke-width="0.8" />
            <path d="M80 340 L140 370 L140 430 L80 400 Z" fill="url(#blockHighlight)" stroke="#22d3ee" stroke-width="0.8" filter="url(#glowCyan)" opacity="0.9" />
            <path d="M140 370 L200 400 L200 460 L140 430 Z" fill="#1e3a5f" stroke="#334155" stroke-width="0.8" />
            <!-- Extra blocks right -->
            <path d="M200 280 L260 310 L260 370 L200 340 Z" fill="#1e3a5f" stroke="#334155" stroke-width="0.8" />
            <path d="M200 340 L260 370 L260 430 L200 400 Z" fill="#1e3a5f" stroke="#334155" stroke-width="0.8" />
            <path d="M200 400 L260 430 L260 490 L200 460 Z" fill="url(#blockHighlight)" stroke="#22d3ee" stroke-width="0.8" filter="url(#glowCyan)" opacity="0.9" />
          </g>
          <!-- Connector lines between blocks -->
          <g stroke="#22d3ee" stroke-width="0.6" opacity="0.6" fill="none">
            <line x1="-130" y1="175" x2="-70" y2="205" />
            <line x1="-70" y1="205" x2="-10" y2="235" />
            <line x1="-130" y1="235" x2="-70" y2="265" />
            <line x1="-70" y1="265" x2="-10" y2="295" />
          </g>
        </g>

        <!-- ========== MIDDLE LAYER: Ontology (icons + network) ========== -->
        <g id="middleLayer" transform="translate(0 -100)">
          <!-- Plane surface (isometric top) -->
          <path d="M-140 20 L40 20 L120 -40 L-60 -40 Z" fill="url(#planeMid)" stroke="#475569" stroke-width="0.6" />
          <!-- Left face -->
          <path d="M-140 20 L-140 50 L40 50 L40 20 Z" fill="#0f172a" stroke="#334155" stroke-width="0.5" opacity="0.9" />
          <!-- Right face -->
          <path d="M40 20 L40 50 L120 10 L120 -40 Z" fill="#1e293b" stroke="#334155" stroke-width="0.5" opacity="0.9" />
          <!-- Glow network lines -->
          <g stroke="#8b5cf6" stroke-width="0.8" fill="none" filter="url(#glowPurple)" opacity="0.9">
            <path d="M-100 -10 L-40 0 L20 -20" />
            <path d="M-40 0 L-40 -25 L0 -30" />
            <path d="M20 -20 L60 -15 L90 -25" />
            <path d="M0 -30 L40 -20 L60 -15" />
            <path d="M-100 -10 L-80 -30 L-40 -25" />
            <path d="M60 -15 L50 10 L10 5" />
            <path d="M-40 0 L-20 15 L20 10" />
          </g>
          <!-- Icons: factory -->
          <g transform="translate(-95 -28)" fill="none" stroke="#8b5cf6" stroke-width="0.8" filter="url(#glowPurple)">
            <rect x="0" y="8" width="14" height="10" />
            <line x1="7" y1="0" x2="7" y2="8" />
            <rect x="4" y="0" width="6" height="5" />
          </g>
          <!-- Office/building -->
          <g transform="translate(-70 -5)" fill="none" stroke="#8b5cf6" stroke-width="0.7" filter="url(#glowPurple)">
            <rect x="0" y="12" width="12" height="8" />
            <line x1="2" y1="12" x2="2" y2="4" />
            <line x1="6" y1="12" x2="6" y2="2" />
            <line x1="10" y1="12" x2="10" y2="4" />
          </g>
          <!-- Central circle (processing) -->
          <g transform="translate(-5 -25)" fill="none" stroke="#8b5cf6" stroke-width="0.8" filter="url(#glowPurple)">
            <circle cx="0" cy="0" r="12" />
            <circle cx="0" cy="0" r="6" />
            <line x1="0" y1="-12" x2="0" y2="-6" />
            <line x1="0" y1="6" x2="0" y2="12" />
            <line x1="-12" y1="0" x2="-6" y2="0" />
            <line x1="6" y1="0" x2="12" y2="0" />
          </g>
          <!-- Ship -->
          <g transform="translate(55 -20)" fill="none" stroke="#8b5cf6" stroke-width="0.6" filter="url(#glowPurple)">
            <path d="M0 14 L18 14 L20 10 L18 6 L0 6 L2 10 Z" />
            <rect x="4" y="2" width="6" height="4" />
          </g>
          <!-- People group -->
          <g transform="translate(-85 8)" fill="none" stroke="#8b5cf6" stroke-width="0.5" filter="url(#glowPurple)">
            <circle cx="4" cy="6" r="2.5" />
            <path d="M4 8.5 v6 M2 14 l4 2 l4 -2" />
            <circle cx="12" cy="6" r="2.5" />
            <path d="M12 8.5 v6 M10 14 l4 2 l4 -2" />
          </g>
          <!-- Aircraft -->
          <g transform="translate(30 -35)" fill="none" stroke="#8b5cf6" stroke-width="0.5" filter="url(#glowPurple)">
            <path d="M0 4 L8 2 L16 4 L8 6 Z" />
            <path d="M4 4 L10 2 L18 4 L10 6 Z" transform="translate(4 0)" />
          </g>
          <!-- Tank/military -->
          <g transform="translate(75 5)" fill="none" stroke="#8b5cf6" stroke-width="0.6" filter="url(#glowPurple)">
            <ellipse cx="8" cy="10" rx="10" ry="4" />
            <rect x="2" y="4" width="12" height="6" />
            <line x1="8" y1="4" x2="8" y2="0" />
          </g>
          <!-- Oil rig / structure -->
          <g transform="translate(-30 5)" fill="none" stroke="#8b5cf6" stroke-width="0.6" filter="url(#glowPurple)">
            <rect x="0" y="8" width="10" height="6" />
            <line x1="5" y1="0" x2="5" y2="8" />
            <line x1="2" y1="4" x2="8" y2="4" />
          </g>
          <!-- Crystalline shape -->
          <g transform="translate(-110 2)" fill="none" stroke="#8b5cf6" stroke-width="0.6" filter="url(#glowPurple)">
            <path d="M6 0 L12 8 L6 16 L0 8 Z" />
            <line x1="6" y1="0" x2="6" y2="16" />
            <line x1="0" y1="8" x2="12" y2="8" />
          </g>
        </g>

        <!-- ========== TOP LAYER: Applications (grid + modules) ========== -->
        <g id="topLayer" transform="translate(0 -195)">
          <!-- Plane surface -->
          <path d="M-120 -50 L20 -50 L80 -85 L-120 -85 Z" fill="url(#planeTop)" stroke="#475569" stroke-width="0.6" />
          <path d="M-120 -50 L-120 -72 L20 -72 L20 -50 Z" fill="#0f172a" stroke="#334155" stroke-width="0.5" opacity="0.9" />
          <path d="M20 -50 L20 -72 L80 -107 L80 -85 Z" fill="#1e293b" stroke="#334155" stroke-width="0.5" opacity="0.9" />
          <!-- Grid lines on top -->
          <g stroke="#6366f1" stroke-width="0.4" fill="none" opacity="0.6" filter="url(#glowPurple)">
            <line x1="-110" y1="-55" x2="70" y2="-90" />
            <line x1="-110" y1="-65" x2="70" y2="-100" />
            <line x1="-100" y1="-52" x2="-80" y2="-60" />
            <line x1="-60" y1="-58" x2="-40" y2="-66" />
            <line x1="-20" y1="-64" x2="0" y2="-72" />
            <line x1="20" y1="-70" x2="40" y2="-78" />
          </g>
          <!-- Module 1: bar chart -->
          <g transform="translate(-105 -78)" filter="url(#glowPurple)">
            <rect x="0" y="0" width="22" height="16" fill="none" stroke="#8b5cf6" stroke-width="0.7" />
            <line x1="4" y1="12" x2="4" y2="6" stroke="#22d3ee" stroke-width="0.8" />
            <line x1="8" y1="12" x2="8" y2="4" stroke="#22d3ee" stroke-width="0.8" />
            <line x1="12" y1="12" x2="12" y2="8" stroke="#22d3ee" stroke-width="0.8" />
            <line x1="16" y1="12" x2="16" y2="5" stroke="#22d3ee" stroke-width="0.8" />
          </g>
          <!-- Module 2: dial -->
          <g transform="translate(-78 -80)" filter="url(#glowPurple)">
            <rect x="0" y="0" width="20" height="18" fill="none" stroke="#8b5cf6" stroke-width="0.7" />
            <path d="M10 4 A6 6 0 0 1 16 10" fill="none" stroke="#22d3ee" stroke-width="0.7" />
            <line x1="10" y1="10" x2="14" y2="8" stroke="#22d3ee" stroke-width="0.6" />
          </g>
          <!-- Module 3: blocks -->
          <g transform="translate(-54 -76)" filter="url(#glowPurple)">
            <rect x="0" y="0" width="18" height="14" fill="none" stroke="#8b5cf6" stroke-width="0.7" />
            <rect x="3" y="3" width="5" height="5" fill="none" stroke="#22d3ee" stroke-width="0.5" />
            <rect x="10" y="3" width="5" height="5" fill="none" stroke="#22d3ee" stroke-width="0.5" />
          </g>
          <!-- Module 4: lines/code -->
          <g transform="translate(-32 -78)" filter="url(#glowPurple)">
            <rect x="0" y="0" width="20" height="16" fill="none" stroke="#8b5cf6" stroke-width="0.7" />
            <line x1="3" y1="4" x2="14" y2="4" stroke="#22d3ee" stroke-width="0.4" />
            <line x1="3" y1="8" x2="10" y2="8" stroke="#22d3ee" stroke-width="0.4" />
            <line x1="3" y1="12" x2="16" y2="12" stroke="#22d3ee" stroke-width="0.4" />
          </g>
          <!-- Module 5 -->
          <g transform="translate(-8 -80)" filter="url(#glowPurple)">
            <rect x="0" y="0" width="22" height="16" fill="none" stroke="#8b5cf6" stroke-width="0.7" />
            <circle cx="7" cy="8" r="2" fill="none" stroke="#22d3ee" stroke-width="0.5" />
            <circle cx="15" cy="8" r="2" fill="none" stroke="#22d3ee" stroke-width="0.5" />
          </g>
          <!-- Module 6 -->
          <g transform="translate(18 -78)" filter="url(#glowPurple)">
            <rect x="0" y="0" width="24" height="14" fill="none" stroke="#8b5cf6" stroke-width="0.7" />
            <line x1="4" y1="7" x2="20" y2="7" stroke="#22d3ee" stroke-width="0.5" />
            <rect x="8" y="3" width="8" height="3" fill="none" stroke="#22d3ee" stroke-width="0.4" />
          </g>
          <!-- Module 7 -->
          <g transform="translate(46 -76)" filter="url(#glowPurple)">
            <rect x="0" y="0" width="20" height="16" fill="none" stroke="#8b5cf6" stroke-width="0.7" />
            <path d="M5 4 L10 8 L5 12" fill="none" stroke="#22d3ee" stroke-width="0.5" />
            <line x1="12" y1="4" x2="12" y2="12" stroke="#22d3ee" stroke-width="0.5" />
          </g>
          <!-- Connector lines between modules -->
          <g stroke="#8b5cf6" stroke-width="0.5" fill="none" filter="url(#glowPurple)" opacity="0.8">
            <line x1="-83" y1="-71" x2="-56" y2="-68" />
            <line x1="-56" y1="-68" x2="-32" y2="-70" />
            <line x1="-32" y1="-70" x2="-10" y2="-72" />
            <line x1="-10" y1="-72" x2="18" y2="-70" />
            <line x1="-94" y1="-70" x2="-78" y2="-72" />
          </g>
        </g>

        <!-- Vertical connection lines (bottom to middle) -->
        <g stroke="#6366f1" stroke-width="0.5" fill="none" opacity="0.5" filter="url(#glowPurple)">
          <line x1="-50" y1="120" x2="-50" y2="-80" />
          <line x1="20" y1="150" x2="20" y2="-80" />
          <line x1="80" y1="180" x2="60" y2="-80" />
        </g>
      </g>
    </svg>
    <div class="toolbar">
      <button class="btn btn-download" id="downloadBtn">下载 SVG</button>
    </div>
  </div>

  <script>
    document.getElementById('downloadBtn').addEventListener('click', function () {
      const svg = document.getElementById('illustration');
      const svgClone = svg.cloneNode(true);
      svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      svgClone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');
      const svgString = new XMLSerializer().serializeToString(svgClone);
      const header = '<?xml version="1.0" encoding="UTF-8" standalone="no"?>';
      const blob = new Blob([header + svgString], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'data-architecture-illustration.svg';
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
